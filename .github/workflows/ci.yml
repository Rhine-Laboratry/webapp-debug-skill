name: CI

"on":
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check installed packages
        run: python -m pip check

      - name: Run unit tests
        run: python -m pytest -q

      - name: Confirm integration tests skip without opt-in
        run: python -m pytest tests/integration -q

      - name: Lint
        run: python -m ruff check .

      - name: Format check
        run: python -m ruff format --check .

      - name: Validate skill metadata
        run: python scripts/validate_skill.py --root .

      - name: Validate Sheets schema
        run: >
          python scripts/validate_sheets_schema.py
          --schema skills/webapp-debug/assets/google-sheets-schema.json

      - name: Validate example config
        run: >
          python scripts/validate_config.py
          --config skills/webapp-debug/assets/webapp-debug.config.example.yml
          --mode init

      - name: Check init Sheets help
        run: python scripts/init_sheets.py --help

      - name: Check coverage help
        run: python scripts/evaluate_coverage.py --help

      - name: Check snapshot export help
        run: python scripts/export_sheets_snapshot.py --help
